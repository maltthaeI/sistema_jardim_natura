<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlim Gráfica | ERP Corporativo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: '#F37020',          
                        brandHover: '#d9641c',     
                        darkBg: '#000000',         
                        darkCard: '#0A0A0A',       
                        darkElevated: '#111111',   
                        darkHover: '#1A1A1A',      
                        darkBorder: '#333333',     
                        darkInput: '#000000'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            transition: background-color 0.3s ease; 
            font-family: 'Montserrat', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .glass { backdrop-filter: blur(12px); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #555; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        input[type="date"] { position: relative; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(0.9); cursor: pointer; opacity: 0.5; transition: opacity 0.2s ease;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: flex !important; flex-direction: column; height: 286mm; width: 100%; }
            body, html { background-color: white !important; color: black !important; margin: 0; padding: 0; }
            @page { margin: 5mm; size: A4 portrait; }
        }
        @media screen {
            .print-only { display: none !important; }
        }
    </style>
</head>
<body class="bg-white dark:bg-darkBg text-gray-900 dark:text-[#EDEDED] min-h-screen selection:bg-brand selection:text-white tracking-tight">
    
    <div id="root"></div>

    <!-- SCRIPT PRINCIPAL DO SISTEMA -->
    <script type="text/babel" src="app.js"></script>

</body>
</html>
